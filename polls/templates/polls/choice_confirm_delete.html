{% extends 'base.html' %}

{% block title %}Seçenek Sil - Django Anketleri{% endblock %}

{% block content %}
<div class="card w-full max-w-lg mx-auto bg-base-100 shadow-xl border border-error/30 mt-10">
    <div class="card-body items-center text-center py-8">
        <h2 class="card-title text-2xl font-bold mb-2 text-error">Seçeneği Sil</h2>
        <p class="text-base-content/70">"<strong class="text-base-content">{{ object.choice_text }}</strong>" seçeneğini
            silmek üzeresiniz. Bu seçeneğe verilen tüm oylar da silinecektir.</p>

        <form method="post" action="" class="w-full mt-6">
            {% csrf_token %}
            <div class="flex flex-col sm:flex-row gap-3 justify-center w-full">
                <a href="javascript:history.back()" class="btn btn-ghost sm:w-1/2">Vazgeç</a>
                <button type="submit" class="btn btn-error text-white sm:w-1/2 shadow-md hover:shadow-lg">Sil</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
